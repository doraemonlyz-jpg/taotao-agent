name: 💡 Feature request
description: Propose a new capability or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us what you want to be able to do · and why. Concrete user
        stories beat abstract feature lists.

  - type: textarea
    id: problem
    attributes:
      label: The problem you're solving
      description: "What can't you do today / what's painful?"
      placeholder: "I'm building X. Today I have to ... which is painful because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposal
      description: "Concrete shape of the solution. Code sketches welcome."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: "What else did you try / would also work?"

  - type: dropdown
    id: scope
    attributes:
      label: Which subsystem does this touch?
      multiple: true
      options:
        - "Graph backend (/chat)"
        - "Harness backend (/chat/v2)"
        - "Tools registry"
        - "Memory layer"
        - "MCP (client or server)"
        - "Multi-agent patterns"
        - "Auth / multi-tenancy"
        - "Frontend"
        - "Docs / books"
        - "CI / CD / DX"
