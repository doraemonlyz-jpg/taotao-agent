# Pre-commit hooks · run before every `git commit` to keep main green.
#
# Install once: `pip install pre-commit && pre-commit install`
# Skip a hook one time: `git commit --no-verify`
# Re-run on all files: `pre-commit run --all-files`
#
# We deliberately use the same versions as backend/pyproject.toml [dependency-groups].dev
# so the local hook output matches CI exactly. Keep these in sync if you bump.
default_language_version:
  python: python3.12

repos:
  # ---------- generic hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|frontend/dist/)
      - id: end-of-file-fixer
        exclude: ^(docs/|frontend/dist/)
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: ^(docs/|frontend/dist/|backend/uv.lock|frontend/package-lock.json)
      - id: detect-private-key

  # ---------- ruff · format + lint backend Python ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        files: ^backend/.*\.py$
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/.*\.py$

  # ---------- prettier · format frontend (TS/JSON/MD/YAML) ----------
  # We don't run prettier on docs HTML · they hand-edit and prettier mangles attributes.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md|yml|yaml)$
        exclude: ^frontend/(dist|node_modules|src/api/types\.ts)/

  # ---------- secret scan · last line of defense ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
